name: CI/CD

on:
  push:
    branches: [ "main", "ci-cd-test" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Dependencies
        run: dotnet restore --verbosity detailed

      - name: Build .NET Projects
        run: dotnet build --no-restore --configuration Release --verbosity detailed

      - name: Run Tests
        run: dotnet test --no-build --verbosity detailed

  docker:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & Push Auth Service
        run: |
          docker build --progress=plain -t ghcr.io/ilyam70/auth:${GITHUB_SHA::8} ./AuthService
          docker push ghcr.io/ilyam70/auth:${GITHUB_SHA::8}

      - name: Build & Push Message Service
        run: |
          docker build --progress=plain -t ghcr.io/ilyam70/messenger:${GITHUB_SHA::8} ./MessageService
          docker push ghcr.io/ilyam70/messenger:${GITHUB_SHA::8}

      - name: Build & Push Web Client
        run: |
          docker build --progress=plain -t ghcr.io/ilyam70/web-client:${GITHUB_SHA::8} ./messanger-web
          docker push ghcr.io/ilyam70/web-client:${GITHUB_SHA::8}

